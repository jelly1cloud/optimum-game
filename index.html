<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Optimum Batcher</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="auth-modal" class="modal">
        <div class="modal-content">
            <h2>OPTIMUM NETWORK</h2>
            <p>Введіть ім'я оператора ноди:</p>
            <input type="text" id="player-name-input" placeholder="Твій нікнейм..." autocomplete="off">
            <button id="start-game-btn">Почати пакування</button>
        </div>
    </div>

    <header class="header">
        <h1>Optimum Batcher</h1>
        <div class="stats">
            <div class="stat-box">Оператор: <span id="display-name">---</span></div>
            <div class="stat-box">Час: <span id="timer">120</span>с</div>
            <div class="stat-box">Ефективність: <span id="score">0</span></div>
        </div>
    </header>

    <main class="game-container">
        <aside class="left-zone">
            <img src="assets/character.jpg" alt="Ведучий" id="character-img" onerror="this.style.display='none'">
            <div class="leaderboard-container">
                <h3>Топ Операторів</h3>
                <ul id="leaderboard-list">
                    </ul>
            </div>
        </aside>

        <section class="board-zone">
            <div id="boards-container"></div>
        </section>

        <aside class="shapes-zone">
            <h3>Мемпул (Черга)</h3>
            <div id="shape-pool"></div>
        </aside>
    </main>

    <footer class="footer">
        <p>Optimum Network</p>
    </footer>

    <div id="ghost-shape"></div>

    <script src="script.js"></script>
</body>
</html>
